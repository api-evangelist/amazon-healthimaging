apis:
- aid: amazon-healthimaging:aws-healthimaging-api
  name: AWS HealthImaging API
  description: The AWS HealthImaging API provides programmatic access to create and manage datastores, image sets, and DICOM
    import jobs for storing and retrieving medical imaging data at scale. The API is HIPAA-eligible and supports sub-second
    image retrieval.
