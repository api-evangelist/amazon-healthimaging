aid: amazon-healthimaging
name: Amazon HealthImaging
description: AWS HealthImaging is a HIPAA-eligible service that helps healthcare providers and their software partners store,
  transform, and apply machine learning to medical images. It provides sub-second image retrieval and enables scaling from
  hundreds to millions of medical images.
type: Index
