tags:
- name: GetDICOMImportJob
paths:
  /getDICOMImportJob/datastore/{datastoreId}/job/{jobId}:
    parameters:
    - $ref: '#/components/parameters/X-Amz-Content-Sha256'
    - $ref: '#/components/parameters/X-Amz-Date'
    - $ref: '#/components/parameters/X-Amz-Algorithm'
    - $ref: '#/components/parameters/X-Amz-Credential'
    - $ref: '#/components/parameters/X-Amz-Security-Token'
    - $ref: '#/components/parameters/X-Amz-Signature'
    - $ref: '#/components/parameters/X-Amz-SignedHeaders'
    get:
      operationId: GetDICOMImportJob
      description: Get the import job properties to learn more about the job or job progress.
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetDICOMImportJobResponse'
        '480':
          description: ThrottlingException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThrottlingException'
        '481':
          description: ConflictException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConflictException'
        '482':
          description: AccessDeniedException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessDeniedException'
        '483':
          description: ValidationException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationException'
        '484':
          description: InternalServerException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerException'
        '485':
          description: ResourceNotFoundException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceNotFoundException'
      parameters:
      - name: datastoreId
        in: path
        required: true
        description: The data store identifier.
        schema:
          type: string
          pattern: '[0-9a-z]{32}'
      - name: jobId
        in: path
        required: true
        description: The import job identifier.
        schema:
          type: string
          pattern: '[0-9a-z]+'
          minLength: 1
          maxLength: 32
      summary: Amazon HealthImaging Get DICOM Import Job
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
      tags:
      - GetDICOMImportJob
components:
  parameters:
    X-Amz-Content-Sha256:
      name: X-Amz-Content-Sha256
      in: header
      schema:
        type: string
      required: false
    X-Amz-Date:
      name: X-Amz-Date
      in: header
      schema:
        type: string
      required: false
    X-Amz-Security-Token:
      name: X-Amz-Security-Token
      in: header
      schema:
        type: string
      required: false
    X-Amz-SignedHeaders:
      name: X-Amz-SignedHeaders
      in: header
      schema:
        type: string
      required: false
    X-Amz-Algorithm:
      name: X-Amz-Algorithm
      in: header
      schema:
        type: string
      required: false
    X-Amz-Signature:
      name: X-Amz-Signature
      in: header
      schema:
        type: string
      required: false
    X-Amz-Credential:
      name: X-Amz-Credential
      in: header
      schema:
        type: string
      required: false
  schemas:
    ResourceNotFoundException: {}
    ConflictException: {}
    DatastoreId:
      type: string
      pattern: '[0-9a-z]{32}'
    S3Uri:
      type: string
      pattern: s3://[a-z0-9][\.\-a-z0-9]{1,61}[a-z0-9](/.*)?
      minLength: 1
      maxLength: 1024
    RoleArn:
      type: string
      pattern: arn:aws(-[^:]+)?:iam::[0-9]{12}:role/.+
      minLength: 20
      maxLength: 2048
    JobId:
      type: string
      pattern: '[0-9a-z]+'
      minLength: 1
      maxLength: 32
    GetDICOMImportJobResponse:
      type: object
      required:
      - jobProperties
      properties:
        jobProperties:
          allOf:
          - $ref: '#/components/schemas/DICOMImportJobProperties'
          - description: The properties of the import job.
    Date:
      type: string
      format: date-time
    Message:
      type: string
      pattern: '[\w -:]+'
      minLength: 1
      maxLength: 2048
    DICOMImportJobProperties:
      type: object
      required:
      - jobId
      - jobName
      - jobStatus
      - datastoreId
      - dataAccessRoleArn
      - inputS3Uri
      - outputS3Uri
      properties:
        jobId:
          allOf:
          - $ref: '#/components/schemas/JobId'
          - description: The import job identifier.
        jobName:
          allOf:
          - $ref: '#/components/schemas/JobName'
          - description: The import job name.
        jobStatus:
          allOf:
          - $ref: '#/components/schemas/JobStatus'
          - description: The filters for listing import jobs based on status.
        datastoreId:
          allOf:
          - $ref: '#/components/schemas/DatastoreId'
          - description: The data store identifier.
        dataAccessRoleArn:
          allOf:
          - $ref: '#/components/schemas/RoleArn'
          - description: The Amazon Resource Name (ARN) that grants permissions to access medical imaging resources.
        endedAt:
          allOf:
          - $ref: '#/components/schemas/Date'
          - description: The timestamp for when the import job was ended.
        submittedAt:
          allOf:
          - $ref: '#/components/schemas/Date'
          - description: The timestamp for when the import job was submitted.
        inputS3Uri:
          allOf:
          - $ref: '#/components/schemas/S3Uri'
          - description: The input prefix path for the S3 bucket that contains the DICOM P10 files to be imported.
        outputS3Uri:
          allOf:
          - $ref: '#/components/schemas/S3Uri'
          - description: The output prefix of the S3 bucket to upload the results of the DICOM import job.
        message:
          allOf:
          - $ref: '#/components/schemas/Message'
          - description: The error message thrown if an import job fails.
      description: Properties of the import job.
    ThrottlingException: {}
    ValidationException: {}
    JobName:
      type: string
      pattern: '[A-Za-z0-9._/#-]+'
      minLength: 1
      maxLength: 64
    JobStatus:
      type: string
      enum:
      - SUBMITTED
      - IN_PROGRESS
      - COMPLETED
      - FAILED
    AccessDeniedException: {}
    InternalServerException: {}
  securitySchemes:
    hmac:
      type: apiKey
      name: Authorization
      in: header
      description: Amazon Signature authorization v4
      x-amazon-apigateway-authtype: awsSigv4
